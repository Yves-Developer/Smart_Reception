version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartreception_db
    restart: always
    environment:
      POSTGRES_DB: smartreception
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: smartreception_backend
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/smartreception
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: smartreception_frontend
    depends_on:
      - backend
    ports:
      - "80:80"

  nginx:
    image: nginx:alpine
    container_name: smartreception_gateway
    ports:
      - "8000:80"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
